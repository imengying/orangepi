name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      full_build:
        description: "Run a full image build smoke test"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  script-check:
    name: Script checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check build script syntax
        run: bash -n build.sh

      - name: Check bundled installer template syntax
        run: |
          set -euo pipefail
          awk '/cat <<'\''SCRIPT'\''/{flag=1; next} flag && /^SCRIPT$/{exit} flag{print}' build.sh > /tmp/orangepi-install-template.sh
          test -s /tmp/orangepi-install-template.sh
          bash -n /tmp/orangepi-install-template.sh

  full-build:
    name: Full image build
    needs: script-check
    if: github.event_name == 'workflow_dispatch' && inputs.full_build == true
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap qemu-user-static parted util-linux dosfstools btrfs-progs rsync tar wget curl xz-utils coreutils git make gcc-aarch64-linux-gnu bc bison flex libssl-dev libelf-dev libgnutls28-dev device-tree-compiler swig python3

      - name: Build image
        run: |
          chmod +x build.sh
          sudo ./build.sh --output "${PWD}/orangepi-zero2-ci.img"

      - name: Find build outputs
        id: output
        run: |
          set -euo pipefail
          FILE_PATH="$(find . -maxdepth 1 -type f -name 'orangepi-zero2-ci.img.xz' | head -n1)"
          if [[ -z "${FILE_PATH}" ]]; then
            echo "Image artifact was not generated"
            exit 1
          fi

          UPDATE_PATH="$(find . -maxdepth 1 -type f -name 'orangepi-zero2-kernel-*-update.tar.xz' | head -n1)"
          if [[ -z "${UPDATE_PATH}" ]]; then
            echo "Kernel update bundle was not generated"
            exit 1
          fi

          echo "image=${FILE_PATH}" >> "${GITHUB_OUTPUT}"
          echo "update=${UPDATE_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: orangepi-ci-${{ github.run_id }}
          path: |
            ${{ steps.output.outputs.image }}
            ${{ steps.output.outputs.update }}
          retention-days: 7
